coverage:
  status:
    project:
      default:
        target: auto        # compare against the base commit
        threshold: 2%        # allow small dips without failing
    patch:
      default:
        target: 80%          # new/changed lines should be well covered
        threshold: 5%

comment:
  layout: "reach, diff, flags, files"
  require_changes: true      # only comment on PRs that move coverage

# Don't count the CLI entry-shims or the optional cartopy plotting against
# coverage. plot.py needs cartopy (no py3.14 wheel, not in the test extra); it is
# integration-tested by the docs build, which renders a real map.
ignore:
  - "src/imdtrack/cli.py"
  - "src/imdtrack/plot.py"
