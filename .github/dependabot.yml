version: 2
updates:
  # Python dependencies declared in pyproject.toml.
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      # One PR for routine minor/patch bumps to keep the noise down.
      python-minor:
        update-types: ["minor", "patch"]
    labels: ["dependencies"]
    commit-message:
      prefix: "deps"

  # GitHub Actions used in the workflows (checkout, setup-python, publish, ...).
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      actions:
        patterns: ["*"]
    labels: ["ci", "dependencies"]
    commit-message:
      prefix: "ci"
