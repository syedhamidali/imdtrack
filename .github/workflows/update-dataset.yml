name: Update dataset

# Rebuild the committed dataset from the IMD workbook once a month.
# - If IMD hasn't changed, nothing is committed and no release is made.
# - If IMD changed and the new file parses + validates, data/ is updated,
#   committed, the version is bumped + tagged, and a release is published.
# - If the new file fails to parse or validate, the job FAILS (red X + GitHub's
#   failure notification email) and the committed dataset is left untouched.
on:
  schedule:
    - cron: "0 6 1 * *"   # 06:00 UTC on the 1st of every month
  workflow_dispatch:
    inputs:
      force:
        description: "Rebuild even if the IMD source is unchanged"
        type: boolean
        default: false

permissions:
  contents: write   # push the refreshed data/, version bump, and tag

concurrency:
  group: update-dataset
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.commit.outputs.changed }}
      version: ${{ steps.commit.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0   # tags needed so hatch-vcs derives the version

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install package (with pipeline extra)
        run: python -m pip install -e ".[all]"

      # If this step exits non-zero (parse/validation failure) the job fails and
      # no commit happens — the previous dataset stays in place.
      - name: Rebuild dataset from IMD
        run: |
          imdtrack build --data-dir data \
            ${{ (github.event_name == 'workflow_dispatch' && inputs.force) && '--force' || '' }}

      - name: Commit and tag if the dataset changed
        id: commit
        run: |
          if [ -z "$(git status --porcelain data)" ]; then
            echo "No dataset changes to commit."
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Version comes from the git tag (hatch-vcs): bump the patch of the
          # latest v* tag. No source file to edit.
          LATEST="$(git describe --tags --abbrev=0 --match 'v*' 2>/dev/null || echo v0.0.0)"
          NEW_VERSION="$(python - "$LATEST" <<'PY'
          import re, sys
          m = re.match(r"v(\d+)\.(\d+)\.(\d+)", sys.argv[1])
          major, minor, patch = map(int, m.groups())
          print(f"v{major}.{minor}.{patch + 1}")
          PY
          )"

          git add data
          git commit -m "data: refresh from IMD best-track workbook (${NEW_VERSION})"
          git tag "${NEW_VERSION}"
          git push origin HEAD --follow-tags

          echo "Committed dataset update and tagged ${NEW_VERSION}."
          echo "changed=true" >> "$GITHUB_OUTPUT"
          echo "version=${NEW_VERSION}" >> "$GITHUB_OUTPUT"

  # Publish only when the dataset actually changed. Reuses the release pipeline
  # (build -> TestPyPI -> PyPI -> GitHub Release) against the freshly-created tag.
  release:
    needs: update
    if: needs.update.outputs.changed == 'true'
    uses: ./.github/workflows/release.yml
    with:
      ref: ${{ needs.update.outputs.version }}
    permissions:
      contents: write
      id-token: write
    secrets: inherit
