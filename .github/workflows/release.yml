name: Release

# On a new release (a v* tag, or the update-dataset pipeline after it bumps the
# version), build the distributions and publish them straight to TestPyPI + PyPI.
# Nothing is uploaded to GitHub: no workflow artifacts, and the GitHub Release
# carries notes only (no dist files attached).
on:
  push:
    tags: ["v*"]
  workflow_dispatch:
  workflow_call:
    inputs:
      ref:
        description: "Tag/ref to build and release"
        required: false
        type: string

permissions:
  contents: read

jobs:
  release:
    name: Build and publish
    runs-on: ubuntu-latest
    permissions:
      contents: write   # create the GitHub Release (notes only)
      id-token: write   # trusted publishing to PyPI/TestPyPI (OIDC)
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.ref }}
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build distributions
        run: |
          python -m pip install --upgrade build twine
          python -m build
          twine check dist/*

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          skip-existing: true

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true

      # Marks the release in GitHub with auto-generated notes. No dist files are
      # attached — the artifacts live on PyPI/TestPyPI.
      - name: Create GitHub Release (notes only)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.ref || github.ref_name }}
          generate_release_notes: true
