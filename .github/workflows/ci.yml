name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: lint (black + ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install lint tools
        run: python -m pip install -e ".[lint]"
      - name: black --check
        run: black --check .
      - name: ruff check
        run: ruff check .

  test:
    name: test (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13", "3.14"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package (with dev extras)
        run: python -m pip install -e ".[dev]"

      - name: Run tests with coverage
        run: pytest --cov=imdtrack --cov-report=xml --cov-report=term-missing

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage.xml
          flags: py${{ matrix.python-version }}
          name: py${{ matrix.python-version }}
          fail_ci_if_error: false

  docs:
    name: build docs (validation only)
    runs-on: ubuntu-latest
    # Only build docs once every other check (tests + lint) is green.
    needs: [test, lint]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install docs deps (same extra Read the Docs installs)
        run: python -m pip install -e ".[docs]"
      # Build only, to catch broken docs on a push/PR. Nothing is uploaded or
      # published from here — the hosted docs (incl. per-PR previews) are built
      # by Read the Docs, not GitHub.
      - name: Build HTML docs (executes example notebooks)
        run: sphinx-build -b html -W --keep-going docs docs/_build/html
