name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: lint (black + ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0   # tags for hatch-vcs version
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - run: uv sync --locked --extra lint
      - name: black --check
        run: uv run black --check .
      - name: ruff check
        run: uv run ruff check .

  test:
    name: test (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13", "3.14"]

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0   # tags for hatch-vcs version

      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Sync (locked) with dev extras
        run: uv sync --locked --extra dev --python ${{ matrix.python-version }}

      - name: Run tests with coverage
        run: uv run pytest --cov=imdtrack --cov-report=xml --cov-report=term-missing

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v7
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage.xml
          flags: py${{ matrix.python-version }}
          name: py${{ matrix.python-version }}
          fail_ci_if_error: false

  docs:
    name: build docs (validation only)
    runs-on: ubuntu-latest
    # Only build docs once every other check (tests + lint) is green.
    needs: [test, lint]
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0   # tags for hatch-vcs version
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - name: Sync (locked) with docs extras
        run: uv sync --locked --extra docs
      # Build only, to catch broken docs on a push/PR. Nothing is uploaded or
      # published from here — the hosted docs (incl. per-PR previews) are built
      # by Read the Docs, not GitHub.
      - name: Build HTML docs (executes example notebooks)
        run: uv run sphinx-build -b html -W --keep-going docs docs/_build/html
